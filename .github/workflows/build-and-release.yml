name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Build DLL
      run: cargo build --release

    - name: Rename DLL
      shell: bash
      run: |
        mv target/release/chain_tracker.dll "./chain-tracker-${{ github.ref_name }}.dll"
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-dll
        path: "chain-tracker-${{ github.ref_name }}.dll"
        retention-days: 1

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: "chain-tracker-${{ github.ref_name }}.dll"
        name: "Release ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
